services:
  - type: web
    name: sinonim
    runtime: node
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ADVANTSHOP_BASE_URL
        sync: false
      - key: ADVANTSHOP_SERVER_API_KEY
        sync: false
      - key: ADVANTSHOP_CLIENT_API_KEY
        sync: false
      - key: ADVANTSHOP_CATEGORY_MAP
        sync: false
