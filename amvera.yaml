# Amvera deploy config — https://docs.amvera.ru/applications/environments/nodejs-server.html
# Рекомендуемый тариф: Стандартный (2.5 ГБ RAM), регион: Москва

meta:
  environment: node
  toolchain:
    name: npm
    version: "20"

build:
  additionalCommands: npm ci && npm run build
  artifacts:
    ".next/standalone/**": /

run:
  command: node server.js
  containerPort: 80
